version: 2

multi-ecosystem-groups:
  maintenance:
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "maintenance"
    open-pull-requests-limit: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "maintenance"
    open-pull-requests-limit: 1
